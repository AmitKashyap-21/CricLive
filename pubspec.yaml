name: criclive
description: "CricLive — Production-grade live cricket score application"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: any

  # UI
  flutter_staggered_grid_view: any
  google_fonts: any
  skeletonizer: any
  flutter_animate: any

  # Networking
  http: any
  flutter_dotenv: any

  # Utils
  intl: any
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: any

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - .env
